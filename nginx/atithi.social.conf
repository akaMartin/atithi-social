# ─────────────────────────────────────────────────────────────────────────────
#  atithi.social – Nginx reverse-proxy configuration
#
#  Place this file at /etc/nginx/sites-available/atithi.social and symlink:
#    sudo ln -s /etc/nginx/sites-available/atithi.social \
#               /etc/nginx/sites-enabled/atithi.social
#
#  SSL certificates are managed by Certbot (Let's Encrypt).
#  Run `sudo certbot --nginx -d atithi.social -d www.atithi.social` after
#  installing this config to obtain and auto-configure the certificates.
# ─────────────────────────────────────────────────────────────────────────────
 
# WebSocket connection upgrade map (used by the proxy_pass location)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
 
# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name atithi.social www.atithi.social;
 
    # ACME challenge directory used by Certbot webroot authenticator
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
 
    # Redirect everything else to HTTPS (301 permanent)
    location / {
        return 301 https://atithi.social$request_uri;
    }
}
 
# ─── www → apex redirect (HTTPS) ─────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.atithi.social;
 
    ssl_certificate     /etc/letsencrypt/live/atithi.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atithi.social/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
 
    return 301 https://atithi.social$request_uri;
}
 
# ─── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name atithi.social;
 
    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/atithi.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atithi.social/privkey.pem;
    # options-ssl-nginx.conf and ssl-dhparams.pem are generated by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
 
    # ── Logging ────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/atithi.social.access.log combined;
    error_log   /var/log/nginx/atithi.social.error.log warn;
 
    # ── Upload and body limits ──────────────────────────────────────────────
    # Friendica accepts photo/video uploads; increase if users upload videos
    client_max_body_size 64M;
 
    # ── Timeouts ────────────────────────────────────────────────────────────
    # ActivityPub delivery and background federation can be slow
    proxy_connect_timeout  75s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
 
    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    # Content-Security-Policy intentionally omitted – Friendica sets its own
 
    # ── Proxy to Friendica container ────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
 
        # Let Friendica know the real client info and protocol
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Port   $server_port;
 
        # WebSocket support (used by some Friendica add-ons)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
 
        # Proxy buffering – on for normal responses, helps with slow clients
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 64k;
        proxy_busy_buffers_size 128k;
 
        # Pass error pages through to the client unmodified
        proxy_intercept_errors off;
    }
 
    # ── Static assets – serve directly from the Friendica HTML volume ───────
    # Uncomment and adjust if you bind-mount /var/www/html to the host for
    # better static file performance (bypasses PHP/Apache for images, CSS, JS).
    #
    # location ~* \.(css|js|gif|jpe?g|png|ico|woff2?|ttf|svg|eot)$ {
    #     root  /opt/atithi-social/friendica_html;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    #     try_files $uri @proxy;
    # }
    # location @proxy {
    #     proxy_pass http://127.0.0.1:8080;
    # }
}